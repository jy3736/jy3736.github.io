/* AIOT dark review theme */
:root {

	--aiot-accent-strong: #79c0ff;
	--aiot-code-bg: #0b1220;
	--aiot-code-text: #d6e2ff;
}

html,
body {
	background: var(--aiot-bg) !important;
	color: var(--aiot-text) !important;
}

@media only screen {
	body {
		max-width: 980px;
		color: var(--aiot-text) !important;
	}
}

.page {
	background: linear-gradient(180deg, rgba(17, 24, 39, 0.94), rgba(13, 17, 23, 0.98)) !important;
	border: 1px solid var(--aiot-border);
	box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
	padding: 2.25rem;
	border-radius: 14px;
}

h2,
h3,

	color: #f8fafc !important;
}

p,

.page-description,

	color: var(--aiot-text) !important;
}
