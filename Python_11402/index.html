<head>

  <title>Python 程式設計 (114-2)</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #111827;
      --text: #e6edf3;
      --muted: #9ba7b4;
      --accent: #79c0ff;
      --border: rgba(148, 163, 184, 0.24);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 10%, rgba(88, 166, 255, 0.18), transparent 32rem),
        linear-gradient(180deg, #111827, var(--bg));
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      padding: 2rem;
    }
    main {
      width: min(42rem, 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(17, 24, 39, 0.86);
      padding: 2rem;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
    }
    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1.15;
    }
    p {
      margin: 0 0 1.25rem;
      color: var(--muted);
    }
    a {
      color: var(--accent);
      text-decoration-color: rgba(121, 192, 255, 0.55);
      text-underline-offset: 0.2em;
    }
  

/* AIOT code block readability patch */
pre.code,
pre.code[class*="language-"],
.code.code-wrap {
	background: #0b1220 !important;
	color: #d6e2ff !important;
	border: 1px solid rgba(148, 163, 184, 0.28) !important;
	border-radius: 10px !important;
	box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.025), 0 12px 28px rgba(0, 0, 0, 0.22) !important;
	padding: 1rem 1.125rem !important;
	overflow-x: auto !important;
	white-space: pre !important;
}

pre.code > code,
pre.code code,
.code.code-wrap > code,
.code.code-wrap code {
	background: transparent !important;
	color: #d6e2ff !important;
	border: 0 !important;
	box-shadow: none !important;
	padding: 0 !important;
	font-size: 0.95rem !important;
	line-height: 1.65 !important;
	white-space: pre !important;
	word-break: normal !important;
	overflow-wrap: normal !important;
	text-shadow: none !important;
}

p code,
li code,
td code,
th code,
h1 code,
h2 code,
h3 code {
	background: transparent !important;
	color: #8ecdf8 !important;
	border: 0 !important;
	border-radius: 0 !important;
	padding: 0 !important;
	box-shadow: none !important;
	font-size: 0.92em !important;
	white-space: break-spaces !important;
}

pre.code .token.comment,
pre.code .token.prolog,
pre.code .token.doctype,
pre.code .token.cdata {
	color: #8b949e !important;
	font-style: italic !important;
}

pre.code .token.punctuation,
pre.code .token.operator,
pre.code .token.entity,
pre.code .token.url,
pre.code .token.variable {
	color: #c9d1d9 !important;
}

pre.code .token.keyword,
pre.code .token.atrule,
pre.code .token.attr-name {
	color: #ff7b72 !important;
}

pre.code .token.string,
pre.code .token.char,
pre.code .token.attr-value,
pre.code .token.regex,
pre.code .token.inserted {
	color: #a5d6ff !important;
}

pre.code .token.number,
pre.code .token.boolean,
pre.code .token.constant,
pre.code .token.symbol,
pre.code .token.deleted {
	color: #79c0ff !important;
}

pre.code .token.function,
pre.code .token.class-name,
pre.code .token.builtin {
	color: #d2a8ff !important;
}

pre.code .token.property,
pre.code .token.tag,
pre.code .token.selector,
pre.code .token.important {
	color: #7ee787 !important;
}

pre.code .token.namespace {
	opacity: 0.9 !important;
}


/* AIOT operator text-only patch */
.token.operator,
pre.code .token.operator,
code .token.operator,
.code.code-wrap .token.operator {
	background: transparent !important;
	background-color: transparent !important;
	border: 0 !important;
	box-shadow: none !important;
	padding: 0 !important;
	color: #c9d1d9 !important;
}

    .aiot-site-footer {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.7;
    }
    .aiot-site-footer p {
      margin: 0;
    }
</style>
